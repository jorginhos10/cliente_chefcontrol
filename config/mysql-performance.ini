# MySQL / MariaDB — configuración recomendada para 100+ negocios simultáneos
# Copiar en: C:\xampp\mysql\bin\my.ini  (sección [mysqld])
# Reiniciar MySQL después de aplicar.
#
# Ajustar según RAM disponible del servidor:
#   4 GB RAM  → innodb_buffer_pool_size = 2G
#   8 GB RAM  → innodb_buffer_pool_size = 5G
#   16 GB RAM → innodb_buffer_pool_size = 11G

[mysqld]

# ── Conexiones ────────────────────────────────────────────────────────────────
max_connections        = 500       # 100 negocios × ~5 usuarios simultáneos
thread_cache_size      = 100       # Reutiliza threads, evita crear uno por conexión
wait_timeout           = 300       # Cierra conexiones inactivas en 5 min
interactive_timeout    = 300

# ── InnoDB (motor principal) ──────────────────────────────────────────────────
innodb_buffer_pool_size     = 1G   # Cache principal — ajustar al 70% de RAM disponible
innodb_buffer_pool_instances = 4   # 1 instancia por cada 1G de buffer pool
innodb_log_file_size        = 256M # Logs de transacción más grandes = menos I/O
innodb_flush_log_at_trx_commit = 2 # Menos fsync — ligero riesgo en crash, gran ganancia
innodb_io_capacity          = 400  # IOPs disponibles (SSD: 2000+, HDD: 200)
innodb_read_io_threads      = 4
innodb_write_io_threads     = 4

# ── Query cache — DESACTIVADO (genera contención en escrituras concurrentes) ──
query_cache_type  = 0
query_cache_size  = 0

# ── Tablas temporales en memoria ──────────────────────────────────────────────
tmp_table_size     = 64M
max_heap_table_size = 64M

# ── Logs de queries lentas (detectar problemas de rendimiento) ────────────────
slow_query_log         = 1
slow_query_log_file    = slow_queries.log
long_query_time        = 1         # Query lenta = más de 1 segundo
log_queries_not_using_indexes = 1  # Detectar queries sin índice
